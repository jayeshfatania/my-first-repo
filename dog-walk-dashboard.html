<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🐾 Sniffout</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#5a7a52">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Sniffout">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--amber:#e8a838;--moss:#5a7a52;--ink:#1a2a1a;--card-bg:rgba(255,255,255,0.22);--card-border:rgba(255,255,255,0.4);--text-muted:rgba(26,42,26,0.55)}
    body{font-family:'DM Sans',sans-serif;min-height:100vh;background:#c8dfc8;transition:background 1.5s ease;overflow-x:hidden}
    body.night{background:#0d1a0d;--card-bg:rgba(255,255,255,0.07);--card-border:rgba(255,255,255,0.12);--ink:#d8ead8;--text-muted:rgba(216,234,216,0.5)}
    .sky{position:fixed;inset:0;z-index:0;background:linear-gradient(160deg,#7fb8a0 0%,#a8d4b8 35%,#c8dfc8 70%,#dde8cc 100%);transition:background 1.5s ease}
    body.night .sky{background:linear-gradient(160deg,#050f05 0%,#0a160a 40%,#0d1a10 100%)}
    .stars{position:fixed;inset:0;z-index:1;opacity:0;transition:opacity 1.5s ease;background-image:radial-gradient(1px 1px at 8% 15%,white,transparent),radial-gradient(1px 1px at 22% 55%,white,transparent),radial-gradient(1.5px 1.5px at 38% 8%,white,transparent),radial-gradient(1px 1px at 52% 38%,white,transparent),radial-gradient(1px 1px at 67% 12%,white,transparent),radial-gradient(1.5px 1.5px at 78% 52%,white,transparent),radial-gradient(1px 1px at 88% 28%,white,transparent),radial-gradient(1px 1px at 12% 75%,white,transparent)}
    body.night .stars{opacity:1}
    .clouds{position:fixed;inset:0;z-index:2;pointer-events:none}
    .cloud{position:absolute;background:rgba(255,255,255,0.55);border-radius:50px;filter:blur(3px);animation:drift linear infinite}
    .cloud::before,.cloud::after{content:'';position:absolute;background:rgba(255,255,255,0.55);border-radius:50%}
    .c1{width:130px;height:38px;top:10%;left:-150px;animation-duration:65s}.c1::before{width:65px;height:58px;top:-28px;left:22px}.c1::after{width:48px;height:42px;top:-20px;left:60px}
    .c2{width:95px;height:30px;top:20%;left:-115px;animation-duration:85s;animation-delay:-35s;opacity:.5}.c2::before{width:48px;height:42px;top:-22px;left:18px}
    .c3{width:160px;height:44px;top:6%;left:-180px;animation-duration:105s;animation-delay:-65s;opacity:.4}.c3::before{width:80px;height:68px;top:-32px;left:32px}
    body.night .clouds{opacity:.08}
    @keyframes drift{from{transform:translateX(0)}to{transform:translateX(120vw)}}
    .wrapper{position:relative;z-index:10;max-width:920px;margin:0 auto;padding:2rem 1.5rem 6rem}
    header{text-align:center;margin-bottom:1.8rem;animation:fadeUp .7s ease both;transition:all .4s ease}
    header.collapsed{margin-bottom:.8rem}
    header.collapsed .logo{display:none}
    header.collapsed h1{font-size:1.1rem;margin-bottom:0}
    header.collapsed .subtitle{display:none}
    .logo{font-size:2.6rem;margin-bottom:.2rem}
    h1{font-family:'Fraunces',serif;font-size:2.2rem;font-weight:300;color:var(--ink);letter-spacing:-.02em}
    .subtitle{font-size:.85rem;color:var(--text-muted);margin-top:.3rem}
    .search-wrap{animation:fadeUp .7s ease .05s both;margin-bottom:1.5rem}
    .search-box{display:flex;gap:.6rem;align-items:center;background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--card-border);border-radius:16px;padding:.7rem 1rem;transition:border-color .2s}
    .search-box:focus-within{border-color:rgba(255,255,255,.7)}
    .search-icon{font-size:1.1rem;flex-shrink:0;opacity:.6}
    .search-input{flex:1;background:none;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--ink)}
    .search-input::placeholder{color:var(--text-muted)}
    .search-btn{background:var(--ink);color:#fff;border:none;border-radius:10px;padding:.45rem 1rem;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;transition:opacity .2s;flex-shrink:0}
    .search-btn:hover{opacity:.8}
    body.night .search-btn{background:rgba(255,255,255,.18);color:var(--ink)}
    .locate-btn{background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--moss);padding:.2rem .4rem;flex-shrink:0;transition:opacity .2s;line-height:1}
    .locate-btn:hover{opacity:.6}
    body.night .locate-btn{color:#7ab87a}
    .location-name{text-align:center;font-size:.8rem;color:var(--text-muted);margin-top:.5rem;min-height:1.2em}
    .search-error{text-align:center;font-size:.8rem;color:#c0392b;margin-top:.5rem;display:none}
    body.night .search-error{color:#e07070}
    /* ── TOP NAV (desktop) ── */
    .top-nav{display:none;position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,0.45);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,0.5);height:58px;align-items:center;padding:0 1.5rem;display:none}
    body.night .top-nav{background:rgba(10,20,10,0.7);border-bottom-color:rgba(255,255,255,0.08)}
    .top-nav-brand{display:flex;align-items:center;gap:.55rem;flex-shrink:0;cursor:pointer;z-index:1}
    .top-nav-brand:hover .top-nav-brand-name{opacity:.7}
    .top-nav-brand-icon{font-size:1.35rem;line-height:1}
    .top-nav-brand-name{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:400;color:var(--ink);letter-spacing:-.01em;transition:opacity .2s}
    .top-nav-centre{position:absolute;left:calc(50% + 110px);transform:translateX(-50%)}
    .top-nav-search{display:none;align-items:center;gap:.5rem;background:var(--card-bg);backdrop-filter:blur(16px);border:1px solid var(--card-border);border-radius:12px;padding:.38rem .75rem;width:320px;transition:border-color .2s}
    .top-nav-search:focus-within{border-color:rgba(255,255,255,.7)}
    .top-nav-search-input{flex:1;background:none;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--ink);min-width:0}
    .top-nav-search-input::placeholder{color:var(--text-muted)}
    .top-nav-search-btn{background:var(--ink);color:#fff;border:none;border-radius:8px;padding:.28rem .7rem;font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:500;cursor:pointer;transition:opacity .2s;flex-shrink:0}
    .top-nav-search-btn:hover{opacity:.8}
    body.night .top-nav-search-btn{background:rgba(255,255,255,.18);color:var(--ink)}
    .top-nav-right{display:flex;align-items:center;gap:.75rem;margin-left:auto;z-index:1}
    .theme-toggle{width:32px;height:32px;border-radius:50%;background:var(--card-bg);border:1px solid var(--card-border);display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;transition:all .2s;flex-shrink:0}
    .theme-toggle:hover{background:rgba(255,255,255,.4)}
    .theme-toggle::before{content:'☀️'}
    body.night .theme-toggle::before{content:'🌙'}
    /* Floating toggle for mobile */
    .theme-toggle-float{position:fixed;top:.85rem;right:1rem;z-index:200;width:36px;height:36px;border-radius:50%;background:var(--card-bg);backdrop-filter:blur(16px);border:1px solid var(--card-border);display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .theme-toggle-float:hover{background:rgba(255,255,255,.5)}
    .theme-toggle-float::before{content:'☀️'}
    body.night .theme-toggle-float::before{content:'🌙'}
    @media(min-width:768px){.theme-toggle-float{display:none}}
    .top-nav-profile{width:32px;height:32px;border-radius:50%;background:var(--card-bg);border:1px solid var(--card-border);display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;transition:all .2s;flex-shrink:0}
    .top-nav-profile:hover{background:rgba(255,255,255,.4)}
    /* ── BOTTOM NAV (mobile only) ── */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;background:rgba(255,255,255,0.55);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,0.5);padding:.5rem 0 calc(.5rem + env(safe-area-inset-bottom))}
    body.night .bottom-nav{background:rgba(10,20,10,0.75);border-top-color:rgba(255,255,255,0.08)}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:.2rem;cursor:pointer;padding:.3rem .5rem;transition:opacity .2s}
    .nav-item-icon{font-size:1.3rem;transition:transform .2s}
    .nav-item-label{font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);font-weight:500;transition:color .2s}
    .nav-item.active .nav-item-label{color:var(--moss)}
    body.night .nav-item.active .nav-item-label{color:#7ab87a}
    .nav-item.active .nav-item-icon{transform:scale(1.15)}
    .nav-dot{width:4px;height:4px;border-radius:50%;background:var(--moss);margin:0 auto;opacity:0;transition:opacity .2s}
    body.night .nav-dot{background:#7ab87a}
    .nav-item.active .nav-dot{opacity:1}
    /* ── LEFT SIDEBAR (desktop) ── */
    .left-sidebar{display:none;position:fixed;top:58px;left:0;bottom:0;width:220px;z-index:90;padding:1.5rem 1rem;overflow-y:auto;background:rgba(255,255,255,0.25);backdrop-filter:blur(20px);border-right:1px solid rgba(255,255,255,0.4)}
    body.night .left-sidebar{background:rgba(10,20,10,0.4);border-right-color:rgba(255,255,255,0.08)}
    .sidebar-section{margin-bottom:1.5rem}
    .sidebar-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;font-weight:500;color:var(--text-muted);padding:.2rem .75rem;margin-bottom:.35rem}
    .sidebar-link{display:flex;align-items:center;gap:.75rem;padding:.6rem .75rem;border-radius:12px;cursor:pointer;transition:all .2s;font-size:.88rem;color:var(--ink);font-family:'DM Sans',sans-serif;border:1px solid transparent;width:100%;background:none;text-align:left}
    .sidebar-link:hover{background:rgba(255,255,255,.4);border-color:rgba(255,255,255,.5)}
    .sidebar-link.active{background:rgba(90,122,82,.12);border-color:rgba(90,122,82,.2);color:var(--moss);font-weight:500}
    body.night .sidebar-link{color:var(--ink)}
    body.night .sidebar-link:hover{background:rgba(255,255,255,.08)}
    body.night .sidebar-link.active{background:rgba(122,184,122,.1);border-color:rgba(122,184,122,.2);color:#7ab87a}
    .sidebar-link-icon{font-size:1.15rem;flex-shrink:0}
    .sidebar-divider{height:1px;background:var(--card-border);margin:.5rem .75rem 1rem}
    .sidebar-coming-soon{font-size:.72rem;color:var(--text-muted);padding:.4rem .75rem;font-style:italic}
    /* ── DESKTOP LAYOUT ── */
    .desktop-layout{display:contents}
    @media(min-width:768px){
      .top-nav{display:flex!important}
      .top-nav-search{display:flex}
      .top-nav-links{display:none!important}
      .bottom-nav{display:none!important}
      .left-sidebar{display:block}
      .wrapper{padding-top:5rem;padding-bottom:2rem;padding-left:240px;max-width:none;margin:0;padding-right:2rem}
      header{display:none}
      .search-wrap{display:none}
    }
    .hazard-warning{border-radius:18px;padding:1.1rem 1.4rem;margin-bottom:1rem;display:flex;align-items:flex-start;gap:.9rem;animation:fadeUp .5s ease both;border:1.5px solid}
    .hazard-warning.red{background:rgba(200,50,50,.1);border-color:rgba(200,50,50,.3)}
    .hazard-warning.amber{background:rgba(220,140,30,.1);border-color:rgba(220,140,30,.3)}
    body.night .hazard-warning.red{background:rgba(200,50,50,.15);border-color:rgba(200,80,80,.4)}
    body.night .hazard-warning.amber{background:rgba(220,140,30,.15);border-color:rgba(220,140,30,.4)}
    .hazard-icon{font-size:1.6rem;flex-shrink:0;margin-top:.1rem}
    .hazard-title{font-family:'Fraunces',serif;font-size:.95rem;font-weight:400;color:var(--ink);margin-bottom:.2rem}
    .hazard-tips{list-style:none;padding:0;margin:0}
    .hazard-tips li{font-size:.78rem;color:var(--text-muted);line-height:1.5;padding:.1rem 0}
    .hazard-tips li::before{content:'→ ';opacity:.5}
    .recommendation{background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--card-border);border-radius:20px;padding:1.5rem 1.8rem;margin-bottom:1.2rem;display:flex;align-items:center;gap:1.2rem;animation:fadeUp .7s ease .1s both}
    .rec-icon{font-size:2.6rem;flex-shrink:0}
    .rec-text h2{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:400;color:var(--ink)}
    .rec-text p{font-size:.83rem;color:var(--text-muted);margin-top:.2rem;line-height:1.5}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:.9rem;margin-bottom:1.2rem}
    .card{background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--card-border);border-radius:18px;padding:1.3rem 1.1rem;transition:transform .2s;animation:fadeUp .7s ease both}
    .card:hover{transform:translateY(-3px)}
    .card-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:.5rem;font-weight:500}
    .card-icon{font-size:1.5rem;margin-bottom:.35rem}
    .card-value{font-family:'Fraunces',serif;font-size:1.9rem;font-weight:300;color:var(--ink);line-height:1}
    .card-unit{font-size:.78rem;color:var(--text-muted);margin-left:.15rem}
    .card-sub{font-size:.76rem;color:var(--text-muted);margin-top:.25rem}
    .rain-card{background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--card-border);border-radius:18px;padding:1.3rem 1.5rem;margin-bottom:1.2rem;animation:fadeUp .7s ease .3s both}
    .rain-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
    .rain-summary-inline{font-size:.78rem;color:var(--text-muted);max-width:55%;line-height:1.4;text-align:right}
    .rain-summary-inline strong{color:var(--ink)}
    .rain-hours{display:flex;gap:.5rem;overflow-x:auto;padding-bottom:.3rem;scrollbar-width:none}
    .rain-hours::-webkit-scrollbar{display:none}
    .rain-hour{display:flex;flex-direction:column;align-items:center;gap:.3rem;min-width:46px}
    .rain-hour .rh-time{font-size:.67rem;color:var(--text-muted)}
    .rain-hour .rh-bar-wrap{width:26px;height:56px;background:rgba(0,0,0,.06);border-radius:6px;display:flex;align-items:flex-end;overflow:hidden}
    body.night .rain-hour .rh-bar-wrap{background:rgba(255,255,255,.06)}
    .rain-hour .rh-bar{width:100%;border-radius:6px}
    .rain-hour .rh-pct{font-size:.67rem;color:var(--ink);font-weight:500}
    .rain-hour .rh-icon{font-size:.85rem}
    .sun-card{background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--card-border);border-radius:18px;padding:1.3rem 1.5rem;margin-bottom:1.2rem;animation:fadeUp .7s ease .35s both}
    .sun-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
    .sun-times{display:flex;justify-content:space-between;align-items:center;gap:1rem}
    .sun-time{text-align:center}
    .sun-time .icon{font-size:1.3rem}
    .sun-time .time{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:300;color:var(--ink)}
    .sun-time .label{font-size:.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em}
    .daylight-bar{flex:1;position:relative;height:6px;background:rgba(0,0,0,.08);border-radius:10px;margin:0 .7rem}
    body.night .daylight-bar{background:rgba(255,255,255,.1)}
    .daylight-fill{height:100%;background:linear-gradient(90deg,#f5a623,#f8d347);border-radius:10px}
    .sun-marker{position:absolute;top:50%;transform:translate(-50%,-50%);font-size:.9rem}
    .uv-bar-wrap{margin-top:.5rem}
    .uv-bar{height:5px;border-radius:10px;background:linear-gradient(90deg,#5cb85c,#f0ad4e,#d9534f);position:relative}
    .uv-marker{position:absolute;top:-4px;width:13px;height:13px;background:white;border:2px solid #555;border-radius:50%;transform:translateX(-50%)}
    .section-intro{background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--card-border);border-radius:18px;padding:1.2rem 1.5rem;margin-bottom:1rem;animation:fadeUp .7s ease .05s both}
    .section-intro-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:.25rem}
    .section-intro h3{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:400;color:var(--ink)}
    .section-intro p{font-size:.8rem;color:var(--text-muted);line-height:1.5;margin-bottom:.9rem}
    .add-walk-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.38rem .9rem;border-radius:20px;background:var(--moss);color:#fff;font-size:.78rem;font-weight:500;font-family:'DM Sans',sans-serif;border:none;cursor:pointer;transition:opacity .2s;flex-shrink:0}
    .add-walk-btn:hover{opacity:.85}
    body.night .add-walk-btn{background:#7ab87a;color:var(--ink)}
    .filter-bar{display:flex;gap:.4rem;flex-wrap:wrap}
    .filter-chip{padding:.3rem .8rem;border-radius:20px;border:1px solid var(--card-border);background:rgba(255,255,255,.15);font-size:.75rem;color:var(--text-muted);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
    .filter-chip:hover{border-color:rgba(90,122,82,.4);color:var(--ink)}
    .filter-chip.active{background:rgba(90,122,82,.12);border-color:rgba(90,122,82,.3);color:var(--moss);font-weight:500}
    body.night .filter-chip.active{background:rgba(122,184,122,.12);border-color:rgba(122,184,122,.3);color:#7ab87a}
    .walks-count{font-size:.75rem;color:var(--text-muted);margin-top:.6rem}
    .item-list{display:flex;flex-direction:column;gap:.9rem}
    .item-card{background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--card-border);border-radius:20px;overflow:hidden;transition:box-shadow .2s;animation:fadeUp .7s ease both;margin-bottom:.7rem;position:relative}
    .item-card:hover{box-shadow:0 6px 24px rgba(0,0,0,.07)}
    /* Compact row - always visible */
    .item-card-compact{display:flex;align-items:center;gap:1rem;padding:1rem 1.2rem;padding-right:2.5rem;cursor:pointer;user-select:none}
    .item-card-compact:hover .item-name{color:var(--moss)}
    body.night .item-card-compact:hover .item-name{color:#7ab87a}
    .item-badge{flex-shrink:0;font-size:1.6rem;width:46px;height:46px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.25);border:1px solid var(--card-border);border-radius:12px}
    .item-compact-body{flex:1;min-width:0}
    .item-name{font-family:'Fraunces',serif;font-size:.92rem;font-weight:400;color:var(--ink);line-height:1.3;margin-bottom:.3rem;transition:color .2s;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .item-compact-meta{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}
    .item-tag{font-size:.67rem;padding:.15rem .55rem;border-radius:20px;border:1px solid var(--card-border);color:var(--text-muted);background:rgba(255,255,255,.15)}
    .item-distance-badge{font-size:.67rem;padding:.15rem .55rem;border-radius:20px;background:rgba(90,122,82,.12);color:var(--moss);border:1px solid rgba(90,122,82,.2);font-weight:500}
    body.night .item-distance-badge{background:rgba(122,184,122,.12);color:#7ab87a;border-color:rgba(122,184,122,.2)}
    .item-compact-right{display:flex;flex-direction:column;align-items:flex-end;gap:.35rem;flex-shrink:0}
    .item-compact-stats{display:flex;gap:.35rem}
    .item-compact-stat{font-size:.72rem;color:var(--text-muted)}
    .item-expand-icon{font-size:.75rem;color:var(--text-muted);transition:transform .25s}
    .item-card.expanded .item-expand-icon{transform:rotate(180deg)}
    .avg-stars-compact{display:flex;align-items:center;gap:.2rem}
    .avg-star-s{font-size:.75rem;opacity:.25}
    .avg-star-s.filled{opacity:1}
    .avg-label-s{font-size:.68rem;color:var(--text-muted)}
    /* Expanded detail - hidden by default */
    .item-card-detail{display:none;padding:0 1.2rem 1.2rem;border-top:1px solid var(--card-border)}
    .item-card.expanded .item-card-detail{display:block}
    .item-stats{display:flex;gap:.45rem;flex-wrap:wrap;margin:.85rem 0 .65rem}
    .item-stat{display:inline-flex;align-items:center;gap:.3rem;font-size:.75rem;color:var(--ink);background:rgba(255,255,255,.2);border:1px solid var(--card-border);border-radius:8px;padding:.22rem .65rem}
    body.night .item-stat{background:rgba(255,255,255,.07)}
    .item-desc{font-size:.82rem;color:var(--text-muted);line-height:1.65;margin-bottom:.65rem}
    .item-weather-note{padding:.55rem .8rem;background:rgba(90,122,82,.07);border-left:3px solid rgba(90,122,82,.3);border-radius:0 8px 8px 0;font-size:.76rem;color:var(--text-muted);margin-bottom:.65rem;line-height:1.5}
    body.night .item-weather-note{background:rgba(122,184,122,.07);border-left-color:rgba(122,184,122,.3)}
    .walk-map-link{display:inline-block;margin-top:.5rem;font-size:.75rem;color:var(--moss);text-decoration:none;border-bottom:1px solid currentColor;padding-bottom:1px}
    .walk-map-link:hover{opacity:.7}
    body.night .walk-map-link{color:#7ab87a}
    /* Stars rating */
    .stars-row{display:flex;gap:.25rem;margin:.6rem 0 .3rem}
    .star{font-size:1.3rem;cursor:pointer;opacity:.3;transition:opacity .15s,transform .15s}
    .star.filled,.star:hover{opacity:1}
    .star:hover{transform:scale(1.2)}
    .avg-stars{display:flex;align-items:center;gap:.35rem}
    .avg-star{font-size:.9rem;opacity:.25}
    .avg-star.filled{opacity:1}
    .avg-label{font-size:.73rem;color:var(--text-muted)}
    /* Reviews section */
    .reviews-section{border-top:1px solid var(--card-border);padding-top:1rem;margin-top:.25rem}
    .reviews-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
    .reviews-title{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);font-weight:500}
    .add-review-btn{display:inline-flex;align-items:center;gap:.35rem;font-size:.75rem;color:var(--moss);background:rgba(90,122,82,.1);border:1px solid rgba(90,122,82,.25);border-radius:20px;padding:.3rem .85rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;font-weight:500}
    .add-review-btn:hover{background:rgba(90,122,82,.2)}
    body.night .add-review-btn{color:#7ab87a;background:rgba(122,184,122,.1);border-color:rgba(122,184,122,.2)}
    .review-item{margin-bottom:.6rem;padding:.65rem .85rem;background:rgba(255,255,255,.12);border:1px solid var(--card-border);border-radius:12px}
    body.night .review-item{background:rgba(255,255,255,.04)}
    .review-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem}
    .review-stars{font-size:.8rem}
    .review-date{font-size:.68rem;color:var(--text-muted)}
    .review-text{font-size:.8rem;color:var(--text-muted);line-height:1.55}
    .review-photo{margin-top:.5rem;width:100%;max-width:280px;border-radius:8px;object-fit:cover;max-height:180px}
    .no-reviews{font-size:.8rem;color:var(--text-muted);font-style:italic;margin-bottom:.6rem}
    /* Add review form */
    .review-form{margin-top:.8rem;padding:.9rem;background:rgba(255,255,255,.12);border-radius:12px;border:1px solid var(--card-border);display:none}
    .review-form.open{display:block}
    .review-form textarea{width:100%;background:rgba(255,255,255,.2);border:1px solid var(--card-border);border-radius:8px;padding:.6rem .8rem;font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--ink);resize:vertical;min-height:70px;outline:none}
    .review-form textarea::placeholder{color:var(--text-muted)}
    .review-form-row{display:flex;gap:.6rem;align-items:center;margin-top:.6rem;flex-wrap:wrap}
    .photo-label{display:inline-flex;align-items:center;gap:.3rem;font-size:.78rem;color:var(--text-muted);background:rgba(255,255,255,.15);border:1px solid var(--card-border);border-radius:8px;padding:.35rem .7rem;cursor:pointer}
    .photo-label:hover{background:rgba(255,255,255,.25)}
    .photo-input{display:none}
    .photo-preview{margin-top:.5rem;max-width:200px;max-height:120px;border-radius:8px;object-fit:cover;display:none}
    .submit-review-btn{background:var(--moss);color:#fff;border:none;border-radius:10px;padding:.4rem 1rem;font-family:'DM Sans',sans-serif;font-size:.8rem;cursor:pointer;transition:opacity .2s;margin-left:auto}
    .submit-review-btn:hover{opacity:.8}
    body.night .submit-review-btn{background:#7ab87a;color:var(--ink)}
    .cancel-review-btn{background:none;border:none;font-size:.78rem;color:var(--text-muted);cursor:pointer;font-family:'DM Sans',sans-serif;padding:.4rem .5rem}
    /* Places page */
    .place-cat-bar{display:flex;gap:.5rem;margin-bottom:1rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:.2rem}
    .place-cat-bar::-webkit-scrollbar{display:none}
    .place-cat-btn{display:flex;flex-direction:column;align-items:center;gap:.2rem;padding:.5rem .7rem;border-radius:12px;border:1px solid var(--card-border);background:var(--card-bg);backdrop-filter:blur(12px);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;flex-shrink:0;min-width:58px}
    .place-cat-btn:hover{background:rgba(255,255,255,.35);border-color:rgba(255,255,255,.6)}
    .place-cat-btn.active{background:rgba(90,122,82,.12);border-color:rgba(90,122,82,.3)}
    body.night .place-cat-btn.active{background:rgba(122,184,122,.1);border-color:rgba(122,184,122,.25)}
    .place-cat-icon{font-size:1.2rem;line-height:1}
    .place-cat-label{font-size:.65rem;color:var(--text-muted);font-weight:500;white-space:nowrap}
    .place-cat-btn.active .place-cat-label{color:var(--moss)}
    body.night .place-cat-btn.active .place-cat-label{color:#7ab87a}
    .place-tip-banner{display:flex;align-items:flex-start;gap:.7rem;background:rgba(232,168,56,.08);border:1px solid rgba(232,168,56,.2);border-radius:14px;padding:.85rem 1rem;margin-bottom:1rem}
    body.night .place-tip-banner{background:rgba(232,168,56,.06);border-color:rgba(232,168,56,.15)}
    .place-tip-icon{font-size:1.1rem;flex-shrink:0;margin-top:.05rem}
    .place-tip-text{font-size:.8rem;color:var(--text-muted);line-height:1.55}
    .place-coming-soon{background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--card-border);border-radius:18px;padding:1.8rem;text-align:center;margin-bottom:1rem}
    .place-coming-soon-icon{font-size:2.2rem;margin-bottom:.65rem}
    .place-coming-soon-title{font-family:'Fraunces',serif;font-size:1rem;font-weight:400;color:var(--ink);margin-bottom:.4rem}
    .place-coming-soon-sub{font-size:.8rem;color:var(--text-muted);line-height:1.6;max-width:480px;margin:0 auto}
    .place-list{display:flex;flex-direction:column;gap:.7rem}
    .place-card{display:flex;align-items:center;gap:1rem;background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--card-border);border-radius:16px;padding:1rem 1.2rem;text-decoration:none;transition:all .2s}
    .place-card:hover{background:rgba(255,255,255,.35);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.06)}
    .place-card-thumb{width:64px;height:64px;border-radius:12px;overflow:hidden;flex-shrink:0;background:rgba(255,255,255,.2);border:1px solid var(--card-border);display:flex;align-items:center;justify-content:center}
    .place-card-photo{width:100%;height:100%;object-fit:cover}
    .place-card-icon-fallback{font-size:1.8rem}
    .place-card-body{flex:1;min-width:0}
    .place-card-name{font-family:'Fraunces',serif;font-size:.95rem;font-weight:400;color:var(--ink);margin-bottom:.3rem;line-height:1.3}
    .place-rating{display:flex;align-items:center;gap:.3rem;margin-bottom:.25rem}
    .place-stars{color:#e8a838;font-size:.8rem;letter-spacing:.05em}
    .place-rating-num{font-size:.78rem;font-weight:500;color:var(--ink)}
    .place-rating-count{font-size:.72rem;color:var(--text-muted)}
    .place-card-address{font-size:.75rem;color:var(--text-muted);margin-bottom:.3rem}
    .place-dist-badge{display:inline-block;background:var(--card-bg);border:1px solid var(--card-border);border-radius:20px;padding:.1rem .5rem;font-size:.7rem;color:var(--ink);margin-right:.3rem}
    /* Sort bar */
    .sort-bar{display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem;flex-wrap:wrap}
    .sort-label{font-size:.72rem;color:var(--text-muted);font-weight:500}
    .sort-btn{background:var(--card-bg);border:1px solid var(--card-border);border-radius:20px;padding:.25rem .75rem;font-size:.75rem;color:var(--ink);font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s}
    .sort-btn.active{background:rgba(90,122,82,.12);border-color:rgba(90,122,82,.3);color:var(--moss);font-weight:500}
    .sort-btn:hover{background:rgba(255,255,255,.35)}
    body.night .sort-btn.active{background:rgba(122,184,122,.1);border-color:rgba(122,184,122,.25);color:#7ab87a}
    .place-card-footer{display:flex;align-items:center;justify-content:space-between;gap:.5rem;flex-wrap:wrap}
    .place-open-badge{font-size:.68rem;font-weight:500;padding:.15rem .55rem;border-radius:20px}
    .place-open-badge.open{background:rgba(90,122,82,.12);color:var(--moss);border:1px solid rgba(90,122,82,.2)}
    .place-open-badge.closed{background:rgba(200,50,50,.08);color:#c03232;border:1px solid rgba(200,50,50,.15)}
    body.night .place-open-badge.open{background:rgba(122,184,122,.12);color:#7ab87a}
    body.night .place-open-badge.closed{color:#e07070;border-color:rgba(200,80,80,.2)}
    .place-card-action{font-size:.75rem;color:var(--moss);font-weight:500}
    body.night .place-card-action{color:#7ab87a}
    .place-empty{background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--card-border);border-radius:18px;padding:2rem;text-align:center}
    .green-spaces-section{margin-top:1.5rem}
    .green-spaces-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:.75rem}
    .green-spaces-title{font-family:'Fraunces',serif;font-size:1rem;font-weight:400;color:var(--ink)}
    .green-spaces-sub{font-size:.72rem;color:var(--text-muted)}
    /* Keep old cat-filter for any legacy use */
    .cat-filter{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
    .cat-btn{padding:.35rem .85rem;border-radius:20px;border:1px solid var(--card-border);background:var(--card-bg);backdrop-filter:blur(12px);font-size:.78rem;color:var(--ink);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
    .cat-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}
    body.night .cat-btn.active{background:rgba(255,255,255,.18);color:var(--ink)}
    .places-loading{text-align:center;padding:2rem;font-size:.85rem;color:var(--text-muted);font-style:italic}
    /* Submit walk form */
    .submit-walk-card{background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--card-border);border-radius:18px;padding:1.2rem 1.4rem;margin-top:1rem}
    .submit-walk-card h4{font-family:'Fraunces',serif;font-size:1rem;font-weight:400;color:var(--ink);margin-bottom:.8rem}
    .sniffout-pick-explainer{font-size:.78rem;color:var(--text-muted);background:rgba(90,122,82,.08);border:1px solid rgba(90,122,82,.15);border-radius:10px;padding:.6rem .8rem;margin-bottom:.9rem;line-height:1.5}
    .sniffout-pick-explainer strong{color:var(--moss)}
    body.night .sniffout-pick-explainer strong{color:#7ab87a}
    .form-field{margin-bottom:.7rem}
    .form-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);font-weight:500;display:block;margin-bottom:.3rem}
    .form-input{width:100%;background:rgba(255,255,255,.2);border:1px solid var(--card-border);border-radius:8px;padding:.55rem .8rem;font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--ink);outline:none}
    .form-input::placeholder{color:var(--text-muted)}
    .form-input:focus{border-color:rgba(255,255,255,.6)}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
    .primary-btn{background:var(--ink);color:#fff;border:none;border-radius:12px;padding:.6rem 1.4rem;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:opacity .2s;width:100%;margin-top:.5rem}
    .primary-btn:hover{opacity:.8}
    body.night .primary-btn{background:rgba(255,255,255,.2);color:var(--ink)}
    .success-msg{text-align:center;padding:.8rem;background:rgba(90,122,82,.1);border-radius:10px;font-size:.82rem;color:var(--moss);margin-top:.7rem;display:none}
    body.night .success-msg{color:#7ab87a}
    .community-badge{display:inline-block;font-size:.68rem;padding:.12rem .5rem;border-radius:20px;background:rgba(232,168,56,.2);color:#a0680a;font-weight:500;margin-left:.4rem}
    body.night .community-badge{background:rgba(232,168,56,.15);color:var(--amber)}
    .curated-badge{display:inline-block;font-size:.68rem;padding:.18rem .6rem;border-radius:20px;background:rgba(90,122,82,.18);color:var(--moss);font-weight:600;white-space:nowrap;margin-top:.3rem;border:1px solid rgba(90,122,82,.25)}
    body.night .curated-badge{background:rgba(122,184,122,.15);color:#7ab87a;border-color:rgba(122,184,122,.25)}
    .item-tap-hint{font-size:.68rem;color:var(--moss);margin-top:.3rem;font-weight:500;text-align:right}
    body.night .item-tap-hint{color:#7ab87a}
    /* Contribution banner */
    .contrib-banner{background:linear-gradient(135deg,rgba(90,122,82,.15),rgba(90,122,82,.05));border:1px solid rgba(90,122,82,.25);border-radius:20px;padding:1.4rem 1.6rem;margin:1rem 0;animation:fadeUp .7s ease both}
    body.night .contrib-banner{background:linear-gradient(135deg,rgba(122,184,122,.1),rgba(122,184,122,.03));border-color:rgba(122,184,122,.2)}
    .contrib-banner-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:.6rem}
    .contrib-banner-title{font-family:'Fraunces',serif;font-size:1rem;font-weight:400;color:var(--ink);margin-bottom:.25rem}
    .contrib-banner-sub{font-size:.8rem;color:var(--text-muted);line-height:1.55}
    .contrib-banner-emoji{font-size:2rem;flex-shrink:0}
    .contrib-actions{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.9rem}
    .contrib-btn-primary{display:inline-flex;align-items:center;gap:.4rem;padding:.4rem 1rem;border-radius:20px;background:var(--moss);color:#fff;font-size:.78rem;font-weight:500;font-family:'DM Sans',sans-serif;border:none;cursor:pointer;transition:opacity .2s}
    .contrib-btn-primary:hover{opacity:.85}
    body.night .contrib-btn-primary{background:#7ab87a;color:var(--ink)}
    .contrib-btn-secondary{display:inline-flex;align-items:center;gap:.4rem;padding:.4rem 1rem;border-radius:20px;background:rgba(90,122,82,.1);color:var(--moss);border:1px solid rgba(90,122,82,.25);font-size:.78rem;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s}
    .contrib-btn-secondary:hover{background:rgba(90,122,82,.2)}
    body.night .contrib-btn-secondary{color:#7ab87a;background:rgba(122,184,122,.08);border-color:rgba(122,184,122,.2)}
    .contrib-stats{display:flex;gap:1.2rem;margin-top:.85rem;padding-top:.85rem;border-top:1px solid rgba(90,122,82,.15)}
    .contrib-stat{text-align:center}
    .contrib-stat-num{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:300;color:var(--moss);display:block}
    body.night .contrib-stat-num{color:#7ab87a}
    .contrib-stat-label{font-size:.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
    /* Progress bar */
    .progress-bar-wrap{margin-top:.6rem}
    .progress-bar-label{font-size:.75rem;color:var(--text-muted);margin-bottom:.3rem}
    .progress-bar-track{height:5px;background:rgba(0,0,0,.08);border-radius:10px;overflow:hidden}
    body.night .progress-bar-track{background:rgba(255,255,255,.1)}
    .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--moss),#7ab87a);border-radius:10px;transition:width .6s ease}
    /* first to review nudge */
    .first-review-nudge{font-size:.78rem;color:var(--moss);font-style:italic;margin-bottom:.5rem;font-weight:500}
    body.night .first-review-nudge{color:#7ab87a}
    .splash{text-align:center;padding:2.5rem 1rem 3rem;animation:fadeUp .7s ease both}
    .splash-badge{display:inline-flex;align-items:center;gap:.4rem;font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;font-weight:500;color:var(--moss);background:rgba(90,122,82,.1);border:1px solid rgba(90,122,82,.2);border-radius:20px;padding:.28rem .85rem;margin-bottom:1.1rem}
    body.night .splash-badge{color:#7ab87a;background:rgba(122,184,122,.1);border-color:rgba(122,184,122,.25)}
    .splash h2{font-family:'Fraunces',serif;font-size:1.9rem;font-weight:300;color:var(--ink);margin-bottom:.65rem;line-height:1.2;max-width:400px;margin-left:auto;margin-right:auto}
    .splash h2 em{font-style:italic;color:var(--moss)}
    .splash p{font-size:.85rem;color:var(--text-muted);line-height:1.65;max-width:340px;margin:0 auto}
    .splash-stats{display:flex;gap:0;justify-content:center;margin:1.5rem auto 0;max-width:380px;background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--card-border);border-radius:16px;overflow:hidden}
    .splash-stat{flex:1;padding:.85rem .5rem;position:relative}
    .splash-stat+.splash-stat::before{content:'';position:absolute;left:0;top:20%;height:60%;width:1px;background:var(--card-border)}
    .splash-stat-num{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:300;color:var(--ink);display:block;line-height:1}
    .splash-stat-label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-top:.25rem;display:block}
    .splash-features{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;margin-top:1.2rem}
    .splash-feat{display:flex;align-items:center;gap:.3rem;font-size:.75rem;color:var(--text-muted);background:var(--card-bg);border:1px solid var(--card-border);border-radius:20px;padding:.28rem .75rem;backdrop-filter:blur(12px)}
    .splash-recent{margin-top:1.4rem}
    .splash-recent-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);font-weight:500;margin-bottom:.55rem}
    .splash-examples{display:flex;flex-wrap:wrap;gap:.45rem;justify-content:center}
    .example-pill{background:var(--card-bg);backdrop-filter:blur(16px);border:1px solid var(--card-border);border-radius:20px;padding:.35rem .9rem;font-size:.78rem;color:var(--ink);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.3rem}
    .example-pill:hover{background:var(--ink);color:#fff}
    .splash-first-visit{font-size:.78rem;color:var(--text-muted);margin-top:1.2rem;font-style:italic}
    .pin-star{font-size:.8rem;cursor:pointer;opacity:.4;transition:opacity .15s;padding:.1rem .2rem;flex-shrink:0}
    .pin-star:hover{opacity:1}
    .pin-star.pinned{opacity:1}
    .pinned-pill{background:rgba(90,122,82,.1);border-color:rgba(90,122,82,.25)}
    body.night .pinned-pill{background:rgba(122,184,122,.08);border-color:rgba(122,184,122,.2)}
    /* Best walk window */
    .best-walk-window{background:rgba(90,122,82,.1);border:1px solid rgba(90,122,82,.2);border-radius:14px;padding:.75rem 1rem;font-size:.82rem;color:var(--ink);margin-bottom:.75rem;line-height:1.5}
    .best-walk-window strong{color:var(--moss)}
    body.night .best-walk-window{background:rgba(122,184,122,.08);border-color:rgba(122,184,122,.2)}
    body.night .best-walk-window strong{color:#7ab87a}
    /* Hourly strip */
    .hourly-card{background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--card-border);border-radius:18px;padding:1rem 1.2rem;margin-bottom:.75rem}
    .hourly-strip{display:flex;gap:.3rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:.2rem}
    .hourly-strip::-webkit-scrollbar{display:none}
    .hf-item{display:flex;flex-direction:column;align-items:center;gap:.2rem;min-width:44px;padding:.4rem .3rem;border-radius:10px;flex-shrink:0;transition:background .15s}
    .hf-item:hover{background:rgba(255,255,255,.3)}
    .hf-now{background:rgba(90,122,82,.12);border:1px solid rgba(90,122,82,.2)}
    body.night .hf-now{background:rgba(122,184,122,.1);border-color:rgba(122,184,122,.2)}
    .hf-time{font-size:.62rem;color:var(--text-muted);font-weight:500}
    .hf-icon{font-size:1.1rem;line-height:1}
    .hf-temp{font-size:.78rem;font-weight:500;color:var(--ink)}
    .hf-rain-bar{width:24px;border-radius:2px;background:#6aabde;transition:height .3s}
    .hf-rain{font-size:.6rem;color:var(--text-muted)}
    /* 7-day forecast */
    .seven-day-card{background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--card-border);border-radius:18px;padding:1rem 1.2rem;margin-bottom:.75rem}
    .day-row{display:grid;grid-template-columns:2.5rem 1.8rem 3rem 1fr 1.4rem;align-items:center;gap:.5rem;padding:.45rem 0;border-bottom:1px solid var(--card-border)}
    .day-row:last-child{border-bottom:none}
    .day-label{font-size:.78rem;font-weight:500;color:var(--ink)}
    .day-icon{font-size:1.1rem;text-align:center}
    .day-temps{display:flex;gap:.3rem;font-size:.75rem}

  {id:'thames-kt2',name:"Thames Path - Kingston to Richmond",area:"Kingston upon Thames",lat:51.4085,lon:-0.3064,icon:"🌊",distance:"8.5km",duration:"2h",difficulty:"Easy",terrain:"Riverside path",tags:["Riverside","Flat","Scenic"],desc:"Gorgeous flat route along the Thames passing Canbury Gardens, Teddington Lock, Ham Lands and Petersham Meadows. Dogs can access the river at multiple points.",wetNote:"Mostly paved and accessible after light rain. Avoid after heavy rain - Ham Lands can flood.",hotNote:"Riverside breezes keep it cool. Dogs can access the river easily."},

  {id:'hogsmill-river',name:"Hogsmill River Greenway",area:"Kingston upon Thames",lat:51.3944,lon:-0.2980,icon:"🏞️",distance:"6km",duration:"1.5h",difficulty:"Easy",terrain:"Riverside path",tags:["Hidden gem","Wildlife","Quiet"],desc:"Hidden green corridor along the Hogsmill River. Surprisingly rural for London - look for kingfishers, herons and water voles.",wetNote:"Riverbank can be muddy after rain. Stick to upper paths.",hotNote:"Well shaded along the river. Calm water great for dogs to paddle."},

function initSeededReviews(){
  const existing=getReviews();
  let changed=false;
  Object.entries(SEEDED_REVIEWS).forEach(([walkId,reviews])=>{
    if(!existing[walkId]){
      existing[walkId]=reviews;
      changed=true;
    }
  });
  if(changed)saveReviews(existing);
}
function getCommunityWalks(){try{return JSON.parse(localStorage.getItem('communityWalks')||'[]')}catch{return[]}}
function saveCommunityWalks(w){localStorage.setItem('communityWalks',JSON.stringify(w))}

function addReview(walkId,stars,text,photoDataUrl){
  const reviews=getReviews();
  if(!reviews[walkId])reviews[walkId]=[];
  reviews[walkId].unshift({stars,text,photo:photoDataUrl||null,date:new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})});
  saveReviews(reviews);
}
function getAvgRating(walkId){
  const reviews=getReviews();
  const r=reviews[walkId]||[];
  if(!r.length)return null;
  return(r.reduce((s,x)=>s+x.stars,0)/r.length).toFixed(1);
}

let weatherData=null,currentTab='weather',currentLocation=null,activeCat='cafe';
function getWmo(c){return WMO[c]||['🌡️','Unknown']}
function fmtTime(iso){return new Date(iso).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}
function windDir(d){return['N','NE','E','SE','S','SW','W','NW'][Math.round(d/45)%8]}
function uvLevel(u){if(u<=2)return['🟢','Low'];if(u<=5)return['🟡','Moderate'];if(u<=7)return['🟠','High'];if(u<=10)return['🔴','Very High'];return['🟣','Extreme']}
function daylightPct(rise,set){const n=Date.now(),r=new Date(rise).getTime(),s=new Date(set).getTime();if(n<r)return 0;if(n>s)return 100;return Math.round(((n-r)/(s-r))*100)}
function rainColor(p){if(p<20)return'#a8d4b8';if(p<50)return'#6aabde';if(p<75)return'#3b82c4';return'#1a4fa0'}
function haversine(lat1,lon1,lat2,lon2){const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))}
function starsHtml(avg,size=''){const full=Math.round(avg||0);return[1,2,3,4,5].map(i=>`<span class="avg-star${i<=full?' filled':''}" style="font-size:${size||'.95rem'}">${i<=full?'⭐':'☆'}</span>`).join('')}

function walkRec(d){
  const rain=[51,53,55,61,63,65,80,81,82,95,99].includes(d.weatherCode),storm=[82,95,99].includes(d.weatherCode),fog=[45,48].includes(d.weatherCode);

  // Also check current hourly rain probability as a fallback - weather code can lag behind reality
  const now=new Date();
  const currentHourProb=d.hourlyTimes
    ?d.hourlyTimes.reduce((best,t,i)=>{
        const diff=Math.abs(new Date(t)-now);
        return diff<best.diff?{diff,prob:d.hourlyRainProb[i]}:best;
      },{diff:Infinity,prob:0}).prob
    :0;
  const actuallyRaining=rain||currentHourProb>=60;

  if(storm)return['⛈️','⚠️ Stay in today','Thunderstorms make this a bad day for walks. Wait it out!'];
  if(d.windGust>=50)return['💨','⚠️ Very windy',`Gusts of ${Math.round(d.windGust)} km/h are too strong. Try later.`];
  if(actuallyRaining&&d.feelsLike<5)return['🥶','It\'s raining and cold - keep it short','Wet and cold out there. A quick walk with a good coat is fine but don\'t linger.'];
  if(actuallyRaining)return['🌧️','It\'s raining - grab the lead & a raincoat','Wet out there but walkable. Stick to shorter paved routes and dry off when you\'re back.'];
  if(fog)return['🌫️','Foggy - stay visible','Low visibility. Stick to familiar routes.'];
  if(d.feelsLike<2)return['🥶','Brisk walk day',`Feels like ${Math.round(d.feelsLike)}°C - keep it short, watch for ice.`];
  if(d.feelsLike>28)return['🌡️','Stay cool on your walk','Quite warm. Walk early or evening and bring water for your dog.'];
  if(d.uvMax>=6)return['☀️','Great walk - watch the UV',`Lovely day but UV is ${d.uvMax}. Walk in shade, check paw temps on tarmac.`];

  // Check upcoming rain in next 3 hours only if it's actually dry right now
  if(d.hourlyTimes&&d.hourlyRainProb){
    const upcoming=d.hourlyTimes.map((t,i)=>({time:new Date(t),prob:d.hourlyRainProb[i]}))
      .filter(h=>h.time>=now&&h.time<=new Date(now.getTime()+3*60*60*1000));
    const maxUpcoming=Math.max(...upcoming.map(h=>h.prob),0);
    if(maxUpcoming>=70)return['🌧️','Rain arriving soon - head out now','It\'s dry now but heavy rain is forecast within 3 hours. Get your walk in soon!'];
    if(maxUpcoming>=40)return['🌦️','Rain likely soon - worth a jacket','Dry at the moment but showers are on the way. A good time for a shorter walk.'];
  }

  return['🐕','Great day for a walk!',`${getWmo(d.weatherCode)[1]} with ${Math.round(d.feelsLike)}°C feels-like. Perfect conditions!`];
}

// ── HAZARD WARNINGS ──────────────────────────────────────────────────────────
function getHazardWarnings(d){
  const warnings=[];
  if(d.feelsLike>=32)warnings.push({level:"red",icon:"🌡️",title:"Extreme heat - consider skipping the walk",tips:["Pavements can exceed 60°C and will burn paws instantly","Dogs can overheat within minutes in this temperature","If you must go out, walk before 8am or after 8pm","Bring plenty of fresh water and take frequent breaks","Watch for excessive panting, drooling or weakness"]});
  else if(d.feelsLike>=25)warnings.push({level:"amber",icon:"☀️",title:"It's hot - take precautions",tips:["Check tarmac with your hand before letting your dog walk on it","Bring water for your dog - they need it more than you in heat","Walk in shade where possible, avoid open exposed areas","Keep walks shorter than usual","Best times to walk: early morning or evening"]});
  if([82,95,99].includes(d.weatherCode))warnings.push({level:"red",icon:"⛈️",title:"Thunderstorm - stay indoors",tips:["Lightning poses a real danger to you and your dog","Many dogs are severely distressed by thunder","Wait until the storm has fully passed before going out","Keep your dog calm indoors with familiar toys or music"]});
  if(d.windGust>=60)warnings.push({level:"red",icon:"💨",title:"Dangerous gusts - do not walk",tips:[`Gusts of ${Math.round(d.windGust)} km/h can knock dogs and people over`,"Falling branches are a serious risk in wooded areas","Stay away from trees, coastal paths and exposed hilltops","Wait for conditions to improve"]});
  else if(d.windGust>=45)warnings.push({level:"amber",icon:"💨",title:"Very strong gusts - be careful",tips:[`Gusts reaching ${Math.round(d.windGust)} km/h today`,"Avoid exposed routes, coastal paths and woodland","Keep your dog on the lead - wind can disorientate them","Keep walks shorter and stay in sheltered areas"]});
  if(d.feelsLike<=-5)warnings.push({level:"red",icon:"🧊",title:"Dangerous cold - keep it very short",tips:["Risk of ice on all surfaces - watch your own footing too","Gritting salt can irritate and burn paw pads","Small dogs and short-haired breeds are at risk of hypothermia","Rinse paws with warm water immediately after the walk","Consider dog boots and a coat for vulnerable dogs"]});
  else if(d.feelsLike<2)warnings.push({level:"amber",icon:"❄️",title:"Freezing temperatures - paw care needed",tips:["Ice and gritting salt can irritate paw pads","Rinse paws with warm water after getting home","Watch for limping or paw-licking - signs of irritation","Keep walks shorter in severe cold"]});
  if(d.uvMax>=8)warnings.push({level:"amber",icon:"🔆",title:"Very high UV - protect your dog",tips:["Light-coloured and short-haired dogs can get sunburned","Apply pet-safe sun cream to nose, ears and belly","Walk in shade wherever possible","Avoid peak UV hours: 11am–3pm"]});
  return warnings;
}

function buildHazardWarnings(d){
  const warnings=getHazardWarnings(d);
  if(!warnings.length) return'';
  return warnings.map(w=>`
    <div class="hazard-warning ${w.level}">
      <div class="hazard-icon">${w.icon}</div>
      <div>
        <div class="hazard-title">${w.title}</div>
        <ul class="hazard-tips">${w.tips.map(t=>`<li>${t}</li>`).join('')}</ul>
      </div>
    </div>`).join('');
}

// ── RAIN & WEATHER RENDERING ─────────────────────────────────────────────────
function getBestWalkWindow(d){
  const now=new Date();
  const nowPlus1=new Date(now.getTime()+60*60*1000);
  const hours=d.hourlyTimes.map((t,i)=>({
    time:new Date(t),label:fmtTime(t),
    temp:Math.round(d.hourlyTemp[i]),
    feels:Math.round(d.hourlyFeels[i]),
    rain:d.hourlyRainProb[i],
    wmo:d.hourlyWmo[i],
  })).filter(h=>{
    const hr=h.time.getHours();
    return h.time>=nowPlus1&&h.time<=new Date(now.getTime()+24*60*60*1000)&&hr>=6&&hr<=22;
  });

  // Score each hour (lower = better)
  const scored=hours.map(h=>{
    let score=0;
    if(h.rain>=70)score+=50;
    else if(h.rain>=40)score+=20;
    else if(h.rain>=20)score+=5;
    if(h.feels<2)score+=30;
    else if(h.feels<5)score+=10;
    if(h.feels>28)score+=25;
    else if(h.feels>24)score+=10;
    if([82,95,99].includes(h.wmo))score+=60;
    return{...h,score};
  });

  // Find best consecutive 2-hour window
  let bestIdx=0,bestScore=Infinity;
  for(let i=0;i<scored.length-1;i++){
    const s=(scored[i].score+scored[i+1].score)/2;
    if(s<bestScore){bestScore=s;bestIdx=i;}
  }
  if(!scored.length)return null;
  const best=scored[bestIdx];
  if(bestScore>40)return null;
  return{label:`${best.label}–${scored[Math.min(bestIdx+2,scored.length-1)].label}`,feels:best.feels,rain:best.rain,wmo:best.wmo,poor:bestScore>20};
}

function buildHourlyStrip(d){
  const now=new Date();
  const hours=d.hourlyTimes.map((t,i)=>({
    time:new Date(t),label:fmtTime(t),
    temp:Math.round(d.hourlyTemp[i]),
    feels:Math.round(d.hourlyFeels[i]),
    rain:d.hourlyRainProb[i],
    wmo:d.hourlyWmo[i],
  })).filter(h=>h.time>=now).slice(0,24);

  const best=getBestWalkWindow(d);
  const bestLabel=best
    ?best.poor
      ?`<div class="best-walk-window">🌧️ Best available window today: <strong>${best.label}</strong> · ${best.feels}°C feels-like · still ${best.rain}% rain chance - bring a raincoat</div>`
      :`<div class="best-walk-window">🐾 Best time to walk today: <strong>${best.label}</strong> · ${best.feels}°C feels-like · ${best.rain}% rain chance</div>`
    :`<div class="best-walk-window">⚠️ Conditions are challenging today - keep walks short and be prepared.</div>`;

  const items=hours.map(h=>{
    const isNow=Math.abs(h.time-now)<30*60*1000;
    const rainBar=h.rain>0?`<div class="hf-rain-bar" style="height:${Math.round(h.rain*0.4)+2}px;opacity:${0.3+h.rain/140}"></div>`:'<div style="height:2px"></div>';
    return`<div class="hf-item${isNow?' hf-now':''}">
      <div class="hf-time">${isNow?'Now':h.label}</div>
      <div class="hf-icon">${getWmo(h.wmo)[0]}</div>
      <div class="hf-temp">${h.temp}°</div>
      ${rainBar}
      <div class="hf-rain">${h.rain}%</div>
    </div>`;
  }).join('');

  return`
    ${bestLabel}
    <div class="hourly-card">
      <div class="card-label" style="margin-bottom:.6rem">Hourly forecast</div>
      <div class="hourly-strip">${items}</div>
    </div>`;
}

function buildSevenDay(d){
  const days=d.dailyTimes.map((t,i)=>{
    const date=new Date(t+'T12:00:00');
    const isToday=i===0;
    const label=isToday?'Today':date.toLocaleDateString('en-GB',{weekday:'short'});
    const[wi]=getWmo(d.dailyWmo[i]);
    const rain=d.dailyRainProb[i];
    const tooHot=d.dailyMax[i]>=25;
    const walkIndicator=tooHot?`<div class="day-walk poor">🚫</div>`:'';
    return`<div class="day-row">
      <div class="day-label">${label}</div>
      <div class="day-icon">${wi}</div>
      <div class="day-temps"><span class="day-max">${Math.round(d.dailyMax[i])}°</span><span class="day-min">${Math.round(d.dailyMin[i])}°</span></div>
      <div class="day-rain-wrap"><div class="day-rain-bar" style="width:${rain}%;background:${rainColor(rain)}"></div><span class="day-rain-pct">${rain}%</span></div>
      ${walkIndicator}
    </div>`;
  }).join('');
  return`<div class="seven-day-card"><div class="card-label" style="margin-bottom:.75rem">7-day forecast</div>${days}</div>`;
}

function buildRainSection(d){
  const now=new Date();
  const hours=d.hourlyTimes.map((t,i)=>({time:fmtTime(t),fullTime:new Date(t),prob:d.hourlyRainProb[i],precip:d.hourlyPrecip[i],wmo:d.hourlyWmo[i]})).filter(h=>h.fullTime>=now).slice(0,12);
  const maxProb=Math.max(...hours.map(h=>h.prob),0),rainHours=hours.filter(h=>h.prob>=40).length,totalPrecip=hours.reduce((s,h)=>s+h.precip,0);
  let summary;
  if(maxProb<20)summary=`<strong>Looks dry</strong> for the rest of today.`;
  else if(maxProb<50)summary=`<strong>Mostly dry</strong> - light showers possible. Worth a jacket.`;
  else if(rainHours<=2)summary=`<strong>Brief showers</strong> (~${rainHours}h). Plan around the dry windows.`;
  else summary=`<strong>Rainy ahead</strong> - ${rainHours}h of rain, up to ${totalPrecip.toFixed(1)}mm expected.`;
  const bars=hours.map(h=>`<div class="rain-hour"><div class="rh-time">${h.time}</div><div class="rh-bar-wrap"><div class="rh-bar" style="height:${h.prob}%;background:${rainColor(h.prob)}"></div></div><div class="rh-pct">${h.prob}%</div><div class="rh-icon">${getWmo(h.wmo)[0]}</div></div>`).join('');
  return`<div class="rain-card"><div class="rain-header"><span class="card-label">Rain forecast - next 12 hours</span><span class="rain-summary-inline">${summary}</span></div><div class="rain-hours">${bars}</div></div>`;
}

let selectedStars={};
function setStars(walkId,val){
  selectedStars[walkId]=val;
  const row=document.getElementById('stars-'+walkId);
  row.querySelectorAll('.star').forEach(s=>{const v=parseInt(s.dataset.v);s.textContent=v<=val?'⭐':'☆';s.classList.toggle('filled',v<=val)});
  document.getElementById('starlabel-'+walkId).textContent=['','⭐ Poor','⭐⭐ Fair','⭐⭐⭐ Good','⭐⭐⭐⭐ Great','⭐⭐⭐⭐⭐ Excellent'][val];
}
function toggleReviewForm(walkId){
  const f=document.getElementById('form-'+walkId);
  f.classList.toggle('open');
}
function previewPhoto(walkId){
  const file=document.getElementById('photo-'+walkId).files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{const img=document.getElementById('preview-'+walkId);img.src=e.target.result;img.style.display='block'};
  reader.readAsDataURL(file);
}
function submitReview(walkId){
  const stars=selectedStars[walkId]||0;
  const text=document.getElementById('text-'+walkId).value.trim();
  const preview=document.getElementById('preview-'+walkId);
  const photo=preview.style.display!=='none'?preview.src:null;
  if(!stars){alert('Please tap a star to rate this walk!');return}
  addReview(walkId,stars,text,photo);
  // Re-render walk panel to show new review
  showTab('walks');
}

function getFavourites(){try{return JSON.parse(localStorage.getItem('sniffout_favs')||'[]');}catch(e){return[];}}
function isFavourite(id){return getFavourites().includes(id);}
function toggleFavourite(id,e){
  e.stopPropagation();
  const favs=getFavourites();
  const idx=favs.indexOf(id);
  if(idx===-1){favs.push(id);}else{favs.splice(idx,1);}
  try{localStorage.setItem('sniffout_favs',JSON.stringify(favs));}catch(e){}
  // Update heart button in place without re-rendering the whole list
  const btn=document.querySelector(`#card-${id} .fav-btn`);
  if(btn){
    const saved=favs.includes(id);
    btn.innerHTML=saved?'❤️':'🤍';
    btn.title=saved?'Remove from favourites':'Save to favourites';
    btn.classList.toggle('fav-btn-active',saved);
  }
}

function renderWalks(activeFilter='all'){

async function loadNearbyGreenSpaces(){
  const el=document.getElementById('green-spaces-results');
  if(!el)return;
  const cacheKey=`greenspaces-${currentLocation.lat}-${currentLocation.lon}`;
  try{
    let places=placesCache[cacheKey];
    if(!places){
      const body={
        textQuery:`parks and nature reserves near ${currentLocation.displayName}`,
        locationBias:{circle:{center:{latitude:currentLocation.lat,longitude:currentLocation.lon},radius:5000}},
        maxResultCount:6,
        languageCode:'en-GB',
      };
      const res=await fetch('https://places.googleapis.com/v1/places:searchText',{
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'X-Goog-Api-Key':PLACES_API_KEY,
          'X-Goog-FieldMask':'places.displayName,places.formattedAddress,places.rating,places.userRatingCount,places.regularOpeningHours,places.googleMapsUri,places.photos,places.location',
        },
        body:JSON.stringify(body),
      });
      const data=await res.json();
      places=data.places||[];
      placesCache[cacheKey]=places;
    }
    if(!places.length){el.innerHTML='<p style="font-size:.8rem;color:var(--text-muted);padding:.5rem 0">No green spaces found nearby.</p>';return;}
    const placesWithDist=places.map(p=>{
      const distKm=p.location?haversine(currentLocation.lat,currentLocation.lon,p.location.latitude,p.location.longitude):null;
      const distStr=distKm?`${distKm<1?(distKm*1000).toFixed(0)+'m':distKm.toFixed(1)+'km'} away`:null;
      return{p,distKm:distKm??Infinity,distStr};
    }).sort((a,b)=>a.distKm-b.distKm);
    el.innerHTML=`<div class="place-list">${placesWithDist.map(({p,distStr})=>renderPlaceCard(p,{emoji:'🌳',distStr})).join('')}</div>`;
  }catch(e){
    el.innerHTML='<p style="font-size:.8rem;color:var(--text-muted);padding:.5rem 0">Couldn\'t load green spaces right now.</p>';
  }
}

function renderStars(rating){
  if(!rating)return'';
  const full=Math.floor(rating);
  const half=rating-full>=0.5;
  let s='';
  for(let i=0;i<5;i++){
    if(i<full)s+='★';
    else if(i===full&&half)s+='½';
    else s+='☆';
  }
  return s;
}

function renderPlaceCard(place,cfg){
  const name=place.displayName?.text||'Unknown venue';
  const address=place.formattedAddress||'';
  const shortAddress=address.split(',').slice(0,2).join(',').trim();
  const rating=place.rating;
  const ratingCount=place.userRatingCount;
  const isOpen=place.regularOpeningHours?.openNow;
  const mapsUrl=place.googleMapsUri||`https://www.google.com/maps/search/${encodeURIComponent(name+' '+address)}`;
  const photoRef=place.photos?.[0]?.name;
  const photoUrl=photoRef?`https://places.googleapis.com/v1/${photoRef}/media?maxHeightPx=120&maxWidthPx=120&key=${PLACES_API_KEY}`:'';

  const openBadge=isOpen===true
    ?`<span class="place-open-badge open">Open now</span>`
    :isOpen===false
    ?`<span class="place-open-badge closed">Closed</span>`
    :'';

  const ratingHtml=rating
    ?`<div class="place-rating"><span class="place-stars">${renderStars(rating)}</span><span class="place-rating-num">${rating.toFixed(1)}</span><span class="place-rating-count">(${ratingCount})</span></div>`
    :'';

  const photoHtml=photoUrl?`<img class="place-card-photo" src="${photoUrl}" alt="${name}" onerror="this.style.display='none'"/>`:`<div class="place-card-icon-fallback">${cfg.emoji}</div>`;

  const distBadge=cfg.distStr?`<span class="place-dist-badge">📍 ${cfg.distStr}</span>`:'';

  return`
    <a class="place-card" href="${mapsUrl}" target="_blank" data-dist="${place.location?haversine(currentLocation.lat,currentLocation.lon,place.location.latitude,place.location.longitude).toFixed(2):'9999'}" data-rating="${rating||0}">
      <div class="place-card-thumb">${photoHtml}</div>
      <div class="place-card-body">
        <div class="place-card-name">${name}</div>
        ${ratingHtml}
        <div class="place-card-address">${distBadge} ${shortAddress}</div>
        <div class="place-card-footer">${openBadge}<span class="place-card-action">View on Google Maps →</span></div>
      </div>
    </a>`;
}

    if(sb)sb.classList.toggle('active',t===tab);
  });

  const p=document.getElementById('panel');
  if(tab==='weather')p.innerHTML=renderWeather(weatherData);
  if(tab==='walks'){p.innerHTML=renderWalks();loadNearbyGreenSpaces();}
  if(tab==='places'){p.innerHTML=renderPlacesPanel();loadPlaces(activeCat);}

function saveSession(){
  if(!currentLocation||!weatherData)return;
  try{localStorage.setItem('sniffout_session',JSON.stringify({location:currentLocation,weather:weatherData,tab:currentTab,savedAt:Date.now()}));}catch(e){}
}

async function restoreSession(){
  try{
    const raw=localStorage.getItem('sniffout_session');
    if(!raw)return false;
    const s=JSON.parse(raw);
    // Only restore if saved within the last 8 hours
    if(Date.now()-s.savedAt>8*60*60*1000){localStorage.removeItem('sniffout_session');return false;}
    currentLocation=s.location;
    weatherData=s.weather;
    // Refresh weather silently in background
    fetchWeather(currentLocation.lat,currentLocation.lon).then(w=>{weatherData=w;saveSession();}).catch(()=>{});
    const hdr=document.querySelector('header');
    if(hdr)hdr.classList.add('collapsed');
    document.getElementById('bottomNav').style.display='';
    document.getElementById('searchInput').value=currentLocation.displayName;
    document.getElementById('topNavSearchInput').value=currentLocation.displayName;
    document.getElementById('locationName').textContent=`📍 ${currentLocation.displayName}`;
    if(!localStorage.getItem('theme'))document.body.classList.toggle('night',!weatherData.isDay);
    showTab(s.tab||'weather');
    return true;
  }catch(e){return false;}
}

// ── GEOCODING & WEATHER ───────────────────────────────────────────────────────
function isPostcode(q){return /^[a-z]{1,2}\d{1,2}[a-z]?\s*\d?[a-z]{0,2}$/i.test(q.trim())}
async function geocodePostcode(pc){const clean=pc.replace(/\s/g,'').toUpperCase();const j=await(await fetch(`https://api.postcodes.io/outcodes/${encodeURIComponent(clean)}`)).json();if(j.status!==200||!j.result)throw new Error('not found');return{lat:j.result.latitude,lon:j.result.longitude,displayName:clean}}
async function geocodePlaceName(name){const q=encodeURIComponent(name+', United Kingdom');const j=await(await fetch(`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1&countrycodes=gb`,{headers:{'Accept-Language':'en'}})).json();if(!j||!j.length)throw new Error('not found');return{lat:parseFloat(j[0].lat),lon:parseFloat(j[0].lon),displayName:j[0].display_name.split(',').slice(0,2).join(',').trim()}}
async function geocode(query){const q=query.trim();if(isPostcode(q)){try{return await geocodePostcode(q)}catch(e){}}return await geocodePlaceName(q)}
async function fetchWeather(lat,lon){
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,is_day&hourly=temperature_2m,apparent_temperature,precipitation_probability,precipitation,weather_code&daily=sunrise,sunset,uv_index_max,weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,wind_gusts_10m_max&timezone=Europe%2FLondon&forecast_days=7`;
  const j=await(await fetch(url)).json();const c=j.current,d=j.daily,h=j.hourly;
  return{temp:Math.round(c.temperature_2m),feelsLike:c.apparent_temperature,humidity:c.relative_humidity_2m,windSpeed:Math.round(c.wind_speed_10m),windDir:windDir(c.wind_direction_10m),windGust:c.wind_gusts_10m,weatherCode:c.weather_code,isDay:c.is_day,sunrise:d.sunrise[0],sunset:d.sunset[0],uvMax:d.uv_index_max[0],hourlyTimes:h.time,hourlyRainProb:h.precipitation_probability,hourlyPrecip:h.precipitation,hourlyWmo:h.weather_code,hourlyTemp:h.temperature_2m,hourlyFeels:h.apparent_temperature,dailyTimes:d.time,dailyWmo:d.weather_code,dailyMax:d.temperature_2m_max,dailyMin:d.temperature_2m_min,dailyRainProb:d.precipitation_probability_max,dailyGusts:d.wind_gusts_10m_max,updatedAt:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}
}
// ── RECENT SEARCHES ──────────────────────────────────────────────────────────
function getRecentSearches(){try{return JSON.parse(localStorage.getItem('recentSearches')||'[]')}catch(e){return[]}}
function saveRecentSearch(query){try{let r=getRecentSearches().filter(s=>s.toLowerCase()!==query.toLowerCase());r.unshift(query);r=r.slice(0,5);localStorage.setItem('recentSearches',JSON.stringify(r))}catch(e){}}
function showSplash(){
  const recent=getRecentSearches();
  const pinned=getPinned();
  const pinnedHTML=pinned.length>0?`
    <div class="splash-recent">
      <div class="splash-recent-label">⭐ Favourite locations</div>
      <div class="splash-examples">${pinned.map(r=>`
        <div class="example-pill pinned-pill">
          <span onclick="useExample('${r}')">${r}</span>
          <span class="pin-star pinned" onclick="togglePin('${r}')" title="Unpin">⭐</span>
        </div>`).join('')}
      </div>
    </div>`:'';
  const unpinned=recent.filter(r=>!pinned.includes(r));
  const recentHTML=unpinned.length>0?`
    <div class="splash-recent">
      <div class="splash-recent-label">Recent searches</div>
      <div class="splash-examples">${unpinned.map(r=>`
        <div class="example-pill">
          <span onclick="useExample('${r}')">🕐 ${r}</span>
          <span class="pin-star" onclick="togglePin('${r}')" title="Pin as favourite">☆</span>
        </div>`).join('')}
      </div>
    </div>`
    :pinned.length===0?`<p class="splash-first-visit">Search any UK location - postcode, town, city or landmark. Try Richmond, SW11 or Hampstead Heath to get started.</p>`:'';
  document.getElementById('app').innerHTML=`<div class="splash">
    <h2>Discover great walks<br><em>Explore more. Together.</em></h2>
    <p>Curated routes, live weather and dog-friendly places - everything you need before you head out.</p>
    ${pinnedHTML}
    ${recentHTML}
  </div>`;
}
function showProfile(){
  const p=document.getElementById('panel');
  window.scrollTo(0,0);
  document.querySelectorAll('.nav-item').forEach((t,i)=>t.classList.toggle('active',['weather','walks','places','profile'][i]==='profile'));
  p.innerHTML=renderProfilePage();
}

function renderProfilePage(){
  const favIds=getFavourites();
  const allWalks=[...WALKS_DB,...getCommunityWalks().map(w=>({...w,community:true}))];
  const favWalks=allWalks.filter(w=>favIds.includes(w.id));
  const reviews=getReviews();
  const totalReviews=Object.values(reviews).reduce((sum,r)=>sum+r.length,0);

  const favSection=favWalks.length
    ?`<div class="profile-fav-list">${favWalks.map(w=>{
        const avg=getAvgRating(w.id);
        const avgHtml=avg?`<span class="profile-fav-rating">★ ${avg}</span>`:'';
        return`<div class="profile-fav-card" onclick="showTab('walks')">
          <div class="profile-fav-icon">${w.icon}</div>
          <div class="profile-fav-body">
            <div class="profile-fav-name">${w.name}</div>
            <div class="profile-fav-meta">${w.distance} · ${w.difficulty} ${avgHtml}</div>
          </div>
          <button class="profile-fav-remove" onclick="event.stopPropagation();toggleFavourite('${w.id}',event);document.getElementById('panel').innerHTML=renderProfilePage()" title="Remove">✕</button>
        </div>`;
      }).join('')}</div>`
    :`<div class="profile-empty">
        <div style="font-size:2.5rem;margin-bottom:.5rem">🤍</div>
        <div class="profile-empty-title">No favourites yet</div>
        <p class="profile-empty-sub">Tap the 🤍 on any walk to save it here.</p>
        <button class="contrib-btn-primary" style="margin-top:.75rem" onclick="showTab('walks')">Browse walks</button>
      </div>`;

  return`
    <div class="profile-page">
      <div class="profile-header">
        <div class="profile-avatar">👤</div>
        <div class="profile-header-body">
          <div class="profile-name">Guest</div>
          <div class="profile-sub">Walks saved on this device</div>
        </div>
      </div>
      <div class="profile-signin-banner">
        <div class="profile-signin-text">
          <strong>Sign in coming soon</strong><br>
          <span>Create an account to sync your favourites and reviews across devices.</span>
        </div>
        <div class="profile-signin-icon">🔐</div>
      </div>
      <div class="profile-stats-row">
        <div class="profile-stat"><span class="profile-stat-num">${favWalks.length}</span><span class="profile-stat-label">Favourites</span></div>
        <div class="profile-stat"><span class="profile-stat-num">${totalReviews}</span><span class="profile-stat-label">Reviews added</span></div>
        <div class="profile-stat"><span class="profile-stat-num">${Object.keys(reviews).length}</span><span class="profile-stat-label">Walks rated</span></div>
      </div>
      <div class="profile-section">
        <div class="profile-section-title">❤️ Favourite walks</div>
        ${favSection}
      </div>
      <div class="profile-section">
        <div class="profile-section-title">⚙️ Settings</div>
        <div class="profile-settings-list">
          <div class="profile-setting-row">
            <span>Dark mode</span>
            <button class="profile-setting-toggle" onclick="toggleTheme()">${document.body.classList.contains('night')?'On':'Off'}</button>
          </div>
          <div class="profile-setting-row">
            <span>Clear all favourites</span>
            <button class="profile-setting-btn-danger" onclick="if(confirm('Clear all favourites?')){localStorage.removeItem('sniffout_favs');document.getElementById('panel').innerHTML=renderProfilePage()}">Clear</button>
          </div>
        </div>
      </div>
      <div class="footer" style="margin-top:1.5rem"><div>Sniffout Beta · <a href="https://tally.so/r/MeO1yM" target="_blank" style="color:var(--moss)">Share feedback</a></div></div>
    </div>`;
}

function goHome(){
  weatherData=null;currentLocation=null;
  localStorage.removeItem('sniffout_session');
  document.getElementById('searchInput').value='';
  document.getElementById('topNavSearchInput').value='';
  document.getElementById('locationName').textContent='';
  document.getElementById('topNavLinks') && (document.getElementById('topNavLinks').style.display='none');
  document.getElementById('bottomNav').style.display='none';
  ['weather','walks','places'].forEach(t=>{const sb=document.getElementById('sb'+t.charAt(0).toUpperCase()+t.slice(1));if(sb)sb.classList.toggle('active',t==='weather')});
  const hdr=document.querySelector('header');
  if(hdr)hdr.classList.remove('collapsed');
  showSplash();
}
function doDesktopSearch(){
  const val=document.getElementById('topNavSearchInput').value.trim();
  if(!val)return;
  document.getElementById('searchInput').value=val;
  doSearch();
}
async function doSearch(){
  const query=document.getElementById('searchInput').value.trim();
  if(!query)return;
  document.getElementById('searchError').style.display='none';
  document.getElementById('locationName').textContent='Searching…';
  renderShell();
  try{
    document.getElementById('bottomNav').style.display='none';
    currentLocation=await geocode(query);
    saveRecentSearch(query);
    // collapse mobile header
    const hdr=document.querySelector('header');
    if(hdr)hdr.classList.add('collapsed');
    document.getElementById('bottomNav').style.display='';
    document.getElementById('topNavSearchInput').value=query;
    document.getElementById('locationName').textContent=`📍 ${currentLocation.displayName}`;
    weatherData=await fetchWeather(currentLocation.lat,currentLocation.lon);
    if(!localStorage.getItem('theme'))document.body.classList.toggle('night',!weatherData.isDay);
    showTab(currentTab);
    saveSession();
  }catch(e){
    document.getElementById('locationName').textContent='';
    document.getElementById('searchError').style.display='block';
    showSplash();
  }
}
function useExample(val){document.getElementById('searchInput').value=val;doSearch()}

async function useCurrentLocation(){
  if(!navigator.geolocation){alert('Geolocation is not supported by your browser.');return;}
  const btn=document.querySelector('.locate-btn');
  if(btn){btn.textContent='⏳';btn.style.opacity='.5';}
  navigator.geolocation.getCurrentPosition(
    async pos=>{
      if(btn){btn.textContent='⌖';btn.style.opacity='';}
      const {latitude:lat,longitude:lon}=pos.coords;
      document.getElementById('searchError').style.display='none';
      document.getElementById('locationName').textContent='Finding your location…';
      renderShell();
      try{
        // Reverse geocode using Open-Meteo's geocoding isn't available, use nominatim
        const res=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
        const data=await res.json();
        const displayName=data.address?.town||data.address?.city||data.address?.suburb||data.address?.county||'Your location';
        currentLocation={lat,lon,displayName};
        saveRecentSearch(displayName);
        const hdr=document.querySelector('header');
        if(hdr)hdr.classList.add('collapsed');
        document.getElementById('bottomNav').style.display='';
        document.getElementById('searchInput').value=displayName;
        document.getElementById('topNavSearchInput').value=displayName;
        document.getElementById('locationName').textContent=`📍 ${displayName}`;
        weatherData=await fetchWeather(lat,lon);
        if(!localStorage.getItem('theme'))document.body.classList.toggle('night',!weatherData.isDay);
        showTab(currentTab);
      }catch(e){
        document.getElementById('locationName').textContent='';
        document.getElementById('searchError').style.display='block';
        showSplash();
      }
    },
    err=>{
      if(btn){btn.textContent='⌖';btn.style.opacity='';}
      alert('Could not get your location. Please check your browser permissions.');
    }
  );
}

// ── PINNED FAVOURITES ──────────────────────────────────────────────────────────
function getPinned(){try{return JSON.parse(localStorage.getItem('sniffout_pinned')||'[]')}catch{return[]}}
function savePinned(pins){localStorage.setItem('sniffout_pinned',JSON.stringify(pins))}
function togglePin(location){
  const pins=getPinned();
  const idx=pins.indexOf(location);
  if(idx>-1){pins.splice(idx,1);}else{pins.unshift(location);}
  savePinned(pins);
  showSplash();
}
async function refreshWeather(){
  if(!currentLocation)return;renderShell();
  try{weatherData=await fetchWeather(currentLocation.lat,currentLocation.lon);document.body.classList.toggle('night',!weatherData.isDay);showTab(currentTab)}
  catch(e){document.getElementById('panel').innerHTML=`<div class="loading">Couldn't refresh. <button class="refresh-btn" onclick="refreshWeather()">Try again</button></div>`}
}
function toggleTheme(){
  const isNight=document.body.classList.toggle('night');
  localStorage.setItem('theme',isNight?'night':'day');
}
document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch()});
document.getElementById('topNavSearchInput').addEventListener('keydown',e=>{if(e.key==='Enter')doDesktopSearch()});
// Apply saved theme preference, or fall back to time-of-day
const savedTheme=localStorage.getItem('theme');
if(savedTheme){
  document.body.classList.toggle('night',savedTheme==='night');
} else {
  const localHour=new Date().getHours();
  if(localHour<6||localHour>=20)document.body.classList.add('night');
}
initSeededReviews();
restoreSession().then(restored=>{if(!restored)showSplash();});
setInterval(()=>{if(weatherData)refreshWeather()},15*60*1000);

// ── SHAREABLE CARD ────────────────────────────────────────────────────────────
function showShareCard(walk){
  const avg=getAvgRating(walk.id);
  const stars=avg?'★'.repeat(Math.round(avg))+'☆'.repeat(5-Math.round(avg)):'No ratings yet';
  const weatherLine=weatherData?`${getWmo(weatherData.weatherCode)[0]} ${Math.round(weatherData.temp)}°C · ${getWmo(weatherData.weatherCode)[1]}`:'';

  const overlay=document.createElement('div');
  overlay.className='share-overlay';
  overlay.innerHTML=`
    <div class="share-modal">
      <div class="share-card" id="shareCardInner">
        <div class="share-card-brand">🐾 Sniffout</div>
        <div class="share-card-walk">${walk.icon} ${walk.name}</div>
        <div class="share-card-area">📍 ${walk.area}</div>
        <div class="share-card-stats">
          <span>🗺️ ${walk.distance}</span>
          <span>⏱️ ${walk.duration}</span>
          <span>💪 ${walk.difficulty}</span>
        </div>
        ${avg?`<div class="share-card-rating">${stars} ${avg}/5</div>`:''}
        ${weatherLine?`<div class="share-card-weather">${weatherLine}</div>`:''}
        <div class="share-card-tag">Found via Sniffout · sniffout.app</div>
      </div>
      <div class="share-actions">
        <button class="share-action-btn" onclick="copyShareLink('${walk.name}','${walk.area}')">🔗 Copy link</button>
        <button class="share-action-btn primary" onclick="screenshotCard()">📸 Save image</button>
        <button class="share-close-btn" onclick="this.closest('.share-overlay').remove()">Close</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function copyShareLink(name,area){
  const text=`🐾 Check out ${name} in ${area} - found on Sniffout! ${window.location.href}`;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.querySelector('.share-action-btn');
    if(btn){btn.textContent='✅ Copied!';setTimeout(()=>{btn.textContent='🔗 Copy link'},2000);}
  });
}

function screenshotCard(){
  const card=document.getElementById('shareCardInner');
  if(!card)return;
  // Native share if available (mobile)
  if(navigator.share){
    const name=card.querySelector('.share-card-walk').textContent;
    const area=card.querySelector('.share-card-area').textContent;
    navigator.share({title:'Sniffout',text:`${name} ${area} - found on Sniffout 🐾`,url:window.location.href})
      .catch(()=>{});
  } else {
    // Fallback - copy text to clipboard
    copyShareLink(
      card.querySelector('.share-card-walk').textContent,
      card.querySelector('.share-card-area').textContent
    );
  }
}
</script>
